# Virtual hosts untuk alutsmani.my.id (staging + production)
# Copy ke VPS: /etc/httpd/vhosts.d/alutsmani.my.id.conf
# Lalu: httpd -t && systemctl reload httpd

# ---------- STAGING ----------
# api2.alutsmani.my.id
<VirtualHost *:80>
    ServerName api2.alutsmani.my.id
    DocumentRoot /var/www/domains/staging/alutsmani.my.id/api2/public
    ErrorLog /var/www/domains/staging/alutsmani.my.id/logs/api2-error.log
    CustomLog /var/www/domains/staging/alutsmani.my.id/logs/api2-access.log combined
    <Directory /var/www/domains/staging/alutsmani.my.id/api2/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>
</VirtualHost>

# uwaba2.alutsmani.my.id
<VirtualHost *:80>
    ServerName uwaba2.alutsmani.my.id
    DocumentRoot /var/www/domains/staging/alutsmani.my.id/uwaba2
    ErrorLog /var/www/domains/staging/alutsmani.my.id/logs/uwaba2-error.log
    CustomLog /var/www/domains/staging/alutsmani.my.id/logs/uwaba2-access.log combined
    <Directory /var/www/domains/staging/alutsmani.my.id/uwaba2>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
</VirtualHost>

