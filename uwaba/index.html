<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aplikasi UWaba telah dialihkan ke eBeddien — buka ebeddien.alutsmani.id untuk melanjutkan." />
  <title>UWaba → eBeddien</title>
  <link rel="icon" type="image/png" href="../gambar/uwaba-4.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-soft: #ccfbf1;
      --bg: #f0fdfa;
      --card: rgba(255, 255, 255, 0.85);
      --text: #134e4a;
      --muted: #5b7c78;
      --shadow: 0 25px 50px -12px rgba(13, 148, 136, 0.18);
      --radius: 1.25rem;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, #99f6e4 0%, transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(45, 212, 191, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(13, 148, 136, 0.12) 0%, transparent 45%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .wrap {
      width: 100%;
      max-width: 28rem;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.9);
      padding: 2rem 1.75rem;
      text-align: center;
    }

    .icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .icon-box {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 1rem;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.12);
      border: 1px solid rgba(13, 148, 136, 0.08);
    }

    .icon-box img {
      width: 3rem;
      height: 3rem;
      object-fit: contain;
    }

    .arrow {
      color: var(--teal);
      opacity: 0.85;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 0.65rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--teal-dark);
      background: var(--teal-soft);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      border: none;
      border-radius: 0.875rem;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 10px 25px -8px rgba(13, 148, 136, 0.55);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px -8px rgba(13, 148, 136, 0.6);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta svg {
      flex-shrink: 0;
    }

    .url {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      word-break: break-all;
    }

    .url a {
      color: var(--teal-dark);
      font-weight: 500;
      text-decoration: none;
    }

    .url a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #94a3a8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <article class="card">
      <span class="badge">Pengalihan layanan</span>
      <div class="icons" aria-hidden="true">
        <div class="icon-box">
          <img src="../gambar/uwaba-4.png" alt="" width="48" height="48" />
        </div>
        <svg class="arrow" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
        <div class="icon-box">
          <img src="../gambar/icon/ebeddienicon192.png" alt="" width="48" height="48" />
        </div>
      </div>
      <h1>Aplikasi UWABA sudah dialihkan ke eBeddien</h1>
      <p>
        Untuk melanjutkan ke aplikasi dan menggunakan fitur UWaba, silakan buka <strong>eBeddien</strong> di tab atau jendela baru.
      </p>
      <a
        class="cta"
        href="https://ebeddien.alutsmani.id/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Buka eBeddien
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <polyline points="15 3 21 3 21 9" />
          <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
      </a>
      <p class="url">
        <a href="https://ebeddien.alutsmani.id/" target="_blank" rel="noopener noreferrer">https://ebeddien.alutsmani.id/</a>
      </p>
    </article>
    <footer>Pesantren Salafiyah Al-Utsmani</footer>
  </div>
</body>
</html>
