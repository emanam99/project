# Satu file per folder deploy: /var/www/wa (prod) atau /var/www/wa2 (staging).
# Variabel PORT di .env (3001 / 3003) dipakai untuk mapping port & proses Node.
# Deploy: docker compose build && docker compose up -d
#
# Lifecycle & restart: biarkan Docker yang mengatur (restart: always). Jangan jalankan
# container ini lewat PM2 — double layer bisa bentrok; PM2 hanya untuk `node server.js` di host tanpa Docker.
#
# Sesi Baileys (Bad MAC / "No matching sessions"): biasanya auth di volume ./whatsapp-sessions korup atau
# dua proses memakai folder yang sama (host npm start + container, atau staging+prod). Hanya SATU instance
# per volume. Lihat wa/docs/TROUBLESHOOTING-WA-SESSION.md

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: alutsmani-wa:local
    container_name: ${WA_CONTAINER_NAME:-wa-app}
    restart: always
    stop_grace_period: 45s
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env
    volumes:
      - ./whatsapp-sessions:/app/whatsapp-sessions
    environment:
      NODE_ENV: production
