<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Navigasi - AI Al-Utsmani</title>
  <link rel="icon" type="image/png" href="../icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <style>
    body {
      background: #1a202c;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 2rem;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    .nav-card {
      background: #2d3748;
      border-radius: 1rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      padding: 2rem 1rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid #4a5568;
      cursor: pointer;
      text-decoration: none;
      color: #e2e8f0;
    }
    .nav-card:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 8px 32px rgba(66,153,225,0.15);
      background: #374151;
      color: #fff;
    }
    .nav-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #4299e1;
      transition: color 0.2s;
    }
    .nav-card:hover .nav-icon {
      color: #63b3ed;
    }
    .nav-label {
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
    }
    @media (max-width: 600px) {
      .nav-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        max-width: 98vw;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .nav-card {
        padding: 1.2rem 0.5rem 0.7rem 0.5rem;
      }
      .nav-label {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="w-full max-w-lg mx-auto mt-8">
    <div class="flex items-center justify-center gap-3 mb-8">
      <img src="../icon.png" alt="Logo AI Al-Utsmani" class="w-20 h-20 rounded-lg">
    </div>

    <div class="flex items-center justify-center gap-3">
      <h1 class="text-2xl font-bold text-center">Navigasi Admin</h1>
    </div>

    <div id="admin-info" class="mb-4 text-center text-base text-gray-300 mb-8"></div>
    <div class="nav-grid">
      <a href="training.html" class="nav-card">
        <i class="fa-solid fa-database nav-icon"></i>
        <div class="nav-label">Training Data</div>
      </a>
      <a href="training_chat.html" class="nav-card">
        <i class="fa-solid fa-comments nav-icon"></i>
        <div class="nav-label">Training Chat</div>
      </a>
      <a href="model-selector.html" class="nav-card">
        <i class="fa-solid fa-robot nav-icon"></i>
        <div class="nav-label">Model Selector</div>
      </a>
      <a href="quota-info.html" class="nav-card">
        <i class="fa-solid fa-gas-pump nav-icon"></i>
        <div class="nav-label">Quota Info</div>
      </a>
      <a href="check-models.html" class="nav-card">
        <i class="fa-solid fa-microchip nav-icon"></i>
        <div class="nav-label">Check Models</div>
      </a>
      <a href="chat-analytics.html" class="nav-card">
        <i class="fa-solid fa-chart-bar nav-icon"></i>
        <div class="nav-label">Chat Analytics</div>
      </a>
      <a href="../index.html" class="nav-card">
        <i class="fa-solid fa-comments nav-icon"></i>
        <div class="nav-label">Chat</div>
      </a>
      <a href="#" class="nav-card" onclick="localStorage.removeItem('adminUserId');location.href='login.html'">
        <i class="fa-solid fa-right-from-bracket nav-icon"></i>
        <div class="nav-label">Logout</div>
      </a>
    </div>
  </div>
  <script>
    // Proteksi: hanya admin login yang bisa akses
    if (!localStorage.getItem('adminUserId')) {
      window.location.href = 'login.html';
    }
    
    const adminId = localStorage.getItem('adminUserId') || '-';
    let adminName = localStorage.getItem('adminUserName');
    const adminInfoDiv = document.getElementById('admin-info');

    function tampilkanAdminInfo(nama, id) {
      adminInfoDiv.innerHTML = `<b>${nama}</b> <span style="color:#4299e1">(${id})</span>`;
    }

    if (!adminName || adminName === '-') {
      // Ambil nama admin dari API jika belum ada di localStorage
      fetch('../api/user.php?id=' + encodeURIComponent(adminId))
        .then(res => res.json())
        .then(data => {
          if (data.success && data.user && data.user.nama) {
            adminName = data.user.nama;
            localStorage.setItem('adminUserName', adminName);
            tampilkanAdminInfo(adminName, adminId);
          } else {
            tampilkanAdminInfo('-', adminId);
          }
        })
        .catch(() => {
          tampilkanAdminInfo('-', adminId);
        });
    } else {
      tampilkanAdminInfo(adminName, adminId);
    }
  </script>
</body>
</html>
