<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Available Gemini Models</title>
  <link rel="icon" type="image/png" href="../icon.png">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
    .model-item { background: #f8f9fa; padding: 10px; margin: 5px 0; border-radius: 4px; border-left: 4px solid #007bff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Check Available Gemini Models</h1>
    
    <div>
      <label>API Key:</label>
      <input type="text" id="apiKey" placeholder="Masukkan API Key Gemini Anda" value="AIzaSyCt-NnICWDG_wW6zft1Ety3yNXt-grtrQY">
    </div>
    
    <button onclick="checkModels()">Check Available Models</button>
    
    <div id="result"></div>
  </div>

  <script>
    if (!localStorage.getItem('adminUserId')) {
      window.location.href = 'login.html';
    }

    async function checkModels() {
      const apiKey = document.getElementById('apiKey').value;
      const resultDiv = document.getElementById('result');
      
      if (!apiKey) {
        resultDiv.innerHTML = '<div class="error">API Key tidak boleh kosong!</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="info">Mengecek model yang tersedia...</div>';
      
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
          const errorText = await response.text();
          console.error('API Error:', errorText);
          resultDiv.innerHTML = `<div class="error">
            <strong>Error ${response.status}:</strong><br>
            ${errorText}
          </div>`;
          return;
        }
        
        const result = await response.json();
        console.log('Models Response:', result);
        
        if (result.models && result.models.length > 0) {
          let modelsHtml = '<div class="success"><strong>✅ Model yang tersedia:</strong></div>';
          
          result.models.forEach(model => {
            const isGenerateContent = model.supportedGenerationMethods && 
              model.supportedGenerationMethods.includes('generateContent');
            
            modelsHtml += `
              <div class="model-item">
                <strong>${model.name}</strong><br>
                <small>Display Name: ${model.displayName || 'N/A'}</small><br>
                <small>Description: ${model.description || 'N/A'}</small><br>
                <small>Generate Content: ${isGenerateContent ? '✅' : '❌'}</small>
              </div>
            `;
          });
          
          resultDiv.innerHTML = modelsHtml;
        } else {
          resultDiv.innerHTML = '<div class="error">Tidak ada model yang ditemukan.</div>';
        }
        
      } catch (error) {
        console.error('Check models error:', error);
        resultDiv.innerHTML = `<div class="error">
          <strong>❌ Error:</strong><br>
          ${error.message}
        </div>`;
      }
    }
  </script>
  <div style="position: absolute; top: 1rem; right: 1rem; z-index: 999; display: flex; gap: 0.5rem;">
    <a href="index.html" title="Menu Admin" style="display:inline-flex;align-items:center;justify-content:center;background:#4299e1;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.3rem;text-decoration:none;transition:background 0.2s;" onmouseover="this.style.background='#3182ce'" onmouseout="this.style.background='#4299e1'"><i class="fa-solid fa-house"></i></a>
    <button onclick="localStorage.removeItem('adminUserId');location.href='login.html'" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">Logout</button>
  </div>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
</body>
</html>
