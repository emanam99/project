<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Al-Utsmani</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../icon.png">
  <link rel="icon" type="image/x-icon" href="../icon.png">
  <link rel="shortcut icon" type="image/x-icon" href="../icon.png">
  <link rel="apple-touch-icon" href="../icon.png">
  <meta name="msapplication-TileImage" content="../icon.png">
  <meta name="msapplication-TileColor" content="#4299e1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #1a202c;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #2d3748;
      border-radius: 1rem;
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 370px;
      border: 1px solid #4a5568;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #fff;
    }
    .form-label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
    }
    .form-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #4a5568;
      border-radius: 0.5rem;
      background: #1a202c;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 1.25rem;
    }
    .form-input:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 2px rgba(66,153,225,0.2);
    }
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: #3182ce;
    }
    .error-msg {
      color: #f56565;
      background: #2d3748;
      border-left: 4px solid #f56565;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="flex items-center justify-center gap-3 mb-6">
      <img src="../icon.png" alt="Logo AI Al-Utsmani" class="w-12 h-12 rounded-lg">
      <div class="login-title">Login Admin</div>
    </div>
    <form id="login-form" autocomplete="off">
      <label class="form-label" for="user_id">User ID</label>
      <input class="form-input" type="text" id="user_id" required autofocus>
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" required>
      <button class="btn-primary" type="submit">Login</button>
      <div id="error-msg" class="error-msg" style="display:none;"></div>
    </form>
  </div>
  <script>
    // Jika sudah login, redirect ke index.html
    if (localStorage.getItem('adminUserId')) {
      window.location.href = 'index.html';
    }
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    form.onsubmit = async function(e) {
      e.preventDefault();
      errorMsg.style.display = 'none';
      const user_id = document.getElementById('user_id').value.trim();
      const password = document.getElementById('password').value;
      if (!user_id || !password) return;
      const res = await fetch('https://alutsmani.id/uwaba/khusus/api/user.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'verify_password', user_id, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('adminUserId', user_id);
        // Ambil nama admin dari API dan simpan ke localStorage
        try {
          const userRes = await fetch('https://alutsmani.id/uwaba/khusus/api/user.php?id=' + encodeURIComponent(user_id));
          const userData = await userRes.json();
          if (userData.success && userData.user && userData.user.nama) {
            localStorage.setItem('adminUserName', userData.user.nama);
          } else {
            localStorage.setItem('adminUserName', '-');
          }
        } catch {
          localStorage.setItem('adminUserName', '-');
        }
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = data.message || 'Login gagal';
        errorMsg.style.display = 'block';
      }
    };
  </script>
</body>
</html>
