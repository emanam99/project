<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Training AI</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../icon.png">
    <link rel="icon" type="image/x-icon" href="../icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="../icon.png">
    <link rel="apple-touch-icon" href="../icon.png">
    <meta name="msapplication-TileImage" content="../icon.png">
    <meta name="msapplication-TileColor" content="#4299e1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a202c; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        #training-container { background-color: #2d3748; border-radius: 0.75rem; box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2); width: 100%; max-width: 1400px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Two-box layout */
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
        }
        
        .input-section {
            background-color: #374151;
            border-radius: 0.75rem;
            padding: 1rem 1rem 0.7rem 1rem;
            border: 1px solid #4a5568;
        }
        .input-section .mb-6 { margin-bottom: 0.7rem; }
        .input-section h2, .input-section h3 { margin-bottom: 0.5rem; }
        .input-section label, .input-section textarea, .input-section input, .input-section select { font-size: 0.95rem; }
        
        .data-section {
            background-color: #374151;
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid #4a5568;
            position: relative;
            max-width: 100%;
            overflow-x: hidden;
        }
        
        /* Desktop layout */
        @media (min-width: 1024px) {
            .content-wrapper {
                grid-template-columns: 400px 1fr;
                gap: 2rem;
            }
            
            .input-section {
                position: sticky;
                top: 1.5rem;
                height: fit-content;
                max-height: calc(100vh - 3rem);
                overflow-y: auto;
            }
            
            #training-container {
                max-width: 1400px;
                height: calc(100vh - 2rem);
            }
        }
        
        /* Mobile layout */
        @media (max-width: 1023px) {
            .content-wrapper {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }
            #training-data-list {
                max-height: 60vh;
                padding: 0.5rem 0.5rem 0.5rem 0.5rem;
            }
            .data-card {
                padding: 0.7rem 0.7rem 0.7rem 0.7rem;
                margin-bottom: 0.5rem;
                border-radius: 0.5rem;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1rem;
                font-weight: 600;
                color: #fff;
                margin-bottom: 0.3rem;
                line-height: 1.4;
            }
            .answer-text {
                font-size: 0.92rem;
                color: #a0aec0;
                line-height: 1.5;
                background-color: #1a202c;
                padding: 0.7rem;
                border-radius: 0.4rem;
                border-left: 3px solid #4299e1;
                margin-bottom: 0;
            }
            .card-actions {
                top: 0.7rem;
                right: 0.7rem;
                gap: 0.3rem;
            }
        }
        
        /* Large desktop layout */
        @media (min-width: 1400px) {
            #training-container {
                max-width: 1600px;
            }
            
            .content-wrapper {
                grid-template-columns: 450px 1fr;
            }
        }
        
        /* Expand button */
        .expand-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background-color: #4299e1;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
        }
        
        .expand-btn:hover {
            background-color: #3182ce;
            transform: scale(1.1);
        }
        
        .expand-btn.expanded {
            background-color: #e53e3e;
        }
        
        .expand-btn.expanded:hover {
            background-color: #c53030;
        }
        
        /* Responsive expand button */
        @media (max-width: 768px) {
            .expand-btn {
                width: 28px;
                height: 28px;
                top: 0.75rem;
                right: 0.75rem;
            }
        }
        
        /* Stats bar transition */
        .stats-bar {
            transition: all 0.3s ease;
            overflow: hidden;
            max-height: 100px;
            opacity: 1;
        }
        
        .stats-bar.hidden {
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
            padding: 0;
        }
        
        /* Modern card styling - SEDERHANA */
        .data-card {
            background: #232b3a;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.85rem;
        }
        .data-card:hover {
            border-color: #4299e1;
            background: #263043;
        }
        .category-badge {
            display: inline-block;
            padding: 0.15rem 0.7rem;
            border-radius: 1rem;
            font-size: 0.62rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        .question-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }
        .answer-text {
            font-size: 0.78rem;
            color: #a0aec0;
            line-height: 1.4;
            background-color: #1a202c;
            padding: 0.5rem 0.75rem;
            border-radius: 0.3rem;
            border-left: 3px solid #4299e1;
        }
        .card-actions {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.3rem;
        }
        .action-btn {
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .edit-btn { background-color: #3182ce; color: white; }
        .edit-btn:hover { background-color: #2c5aa0; }
        .delete-btn { background-color: #e53e3e; color: white; }
        .delete-btn:hover { background-color: #c53030; }
        .text-xs.text-blue-400.mt-2 { font-size: 0.7rem; margin-top: 0.1rem; color: #63b3ed; }
        .text-xs.text-blue-400 {
            font-size: 0.7rem !important;
        }
        
        .category-umum { background-color: #38a169; color: white; }
        .category-akademik { background-color: #3182ce; color: white; }
        .category-keagamaan { background-color: #d69e2e; color: white; }
        .category-teknis { background-color: #805ad5; color: white; }
        .category-lainnya { background-color: #e53e3e; color: white; }
        
        /* Dynamic category colors - fallback for new categories */
        .category-badge:not([class*="category-"]) {
            background-color: #6b7280;
            color: white;
        }
        
        .question-text {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }
        
        .answer-text {
            font-size: 0.875rem;
            color: #a0aec0;
            line-height: 1.6;
            background-color: #1a202c;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #4299e1;
        }
        
        .card-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }
        
        .edit-btn {
            background-color: #3182ce;
            color: white;
        }
        
        .edit-btn:hover {
            background-color: #2c5aa0;
            transform: scale(1.1);
        }
        
        .delete-btn {
            background-color: #e53e3e;
            color: white;
        }
        
        .delete-btn:hover {
            background-color: #c53030;
            transform: scale(1.1);
        }
        
        .category-filter {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 0.25rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            scrollbar-width: thin;
            scrollbar-color: #4a5568 #232b3a;
            width: 100%;
            max-width: 100%;
            padding-bottom: 4px;
            min-height: 44px; /* agar scrollbar tidak ketutup */
            box-sizing: border-box;
        }
        .category-filter::-webkit-scrollbar {
            height: 5px;
        }
        .category-filter::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 3px;
        }
        .category-filter::-webkit-scrollbar-track {
            background: #232b3a;
        }
        .filter-btn {
            white-space: nowrap;
            padding: 0.25rem 0.7rem;
            border: 1px solid #4a5568;
            border-radius: 0.4rem;
            background-color: #2d3748;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }
        .filter-btn.active {
            background-color: #4299e1;
            border-color: #4299e1;
            color: white;
        }
        .filter-btn:hover {
            background-color: #3182ce;
            border-color: #3182ce;
        }
        #training-data-list {
            background: #232b3a;
            border-radius: 0.7rem;
            padding: 1.2rem 0;
            max-height: 32vh;
            min-height: 100px;
            transition: max-height 0.3s, min-height 0.3s, padding 0.3s;
        }
        .stats-bar.hidden ~ #training-data-list {
            max-height: 55vh;
            min-height: 150px;
        }
        @media (min-width: 1024px) {
            #training-data-list {
                max-height: 40vh;
            }
            .stats-bar.hidden ~ #training-data-list {
                max-height: 55vh;
            }
        }
        .data-card-simple {
            background: none;
            border: none;
            border-bottom: 1px solid #374151;
            border-radius: 0;
            padding: 0.7rem 0;
            margin: 0;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .data-card-simple:last-child {
            border-bottom: none;
        }
        .data-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }
        .card-actions-simple {
            display: flex;
            gap: 0.3rem;
        }
        .question-simple {
            background: #4a5568;
            color: #fff;
            padding: 0.7rem 1rem;
            border-radius: 0.4rem;
            margin-bottom: 0.2rem;
            font-size: 1rem;
        }
        .answer-simple {
            background: #2d3748;
            color: #a0aec0;
            padding: 0.7rem 1rem;
            border-radius: 0.4rem;
            border-left: 4px solid #4299e1;
            font-size: 0.95rem;
            white-space: pre-line;
        }
        @media (max-width: 768px) {
            .data-card-simple {
                padding: 0.7rem 0.7rem;
                font-size: 0.92rem;
            }
            .question-simple, .answer-simple {
                padding: 0.6rem 0.7rem;
                font-size: 0.98rem;
            }
        }
    </style>
</head>

    <script>
        if (!localStorage.getItem('adminUserId')) {
            window.location.href = 'login.html';
        }
        const questionInput = document.getElementById('question-input');
        const answerInput = document.getElementById('answer-input');
        const categoryInput = document.getElementById('category-input');
        const addCategoryFromFormBtn = document.getElementById('add-category-from-form-btn');
        const quickAddCategory = document.getElementById('quick-add-category');
        const quickCategoryInput = document.getElementById('quick-category-input');
        const saveQuickCategoryBtn = document.getElementById('save-quick-category-btn');
        const cancelQuickCategoryBtn = document.getElementById('cancel-quick-category-btn');
        const addDataBtn = document.getElementById('add-data-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const clearDataBtn = document.getElementById('clear-data-btn');
        const trainingDataList = document.getElementById('training-data-list');
        const dataFile = document.getElementById('data-file');
        
        // Category modal elements
        const categoryModal = document.getElementById('category-modal');
        const addCategoryBtn = document.getElementById('add-category-btn');
        const newCategoryInput = document.getElementById('new-category-input');
        const categoryColorInput = document.getElementById('category-color-input');
        const saveCategoryBtn = document.getElementById('save-category-btn');
        const cancelCategoryBtn = document.getElementById('cancel-category-btn');
        
        // Expand button elements
        const expandBtn = document.getElementById('expand-btn');
        const expandIcon = document.getElementById('expand-icon');
        const statsBar = document.querySelector('.stats-bar');
    
        const API_URL = 'https://alutsmani.id/psa/chat/api/training.php';
    
        let trainingData = [];
        let editingId = null; // untuk tracking data yang sedang diedit
        let availableCategories = ['Umum', 'Akademik', 'Keagamaan', 'Lainnya']; // Default categories
        
        function getCategoryClass(category) {
            const categoryLower = category.toLowerCase();
            const predefinedCategories = ['umum', 'akademik', 'keagamaan', 'lainnya'];
            
            if (predefinedCategories.includes(categoryLower)) {
                return `category-${categoryLower}`;
            }
            
            return ''; // Return empty string for custom categories (will use fallback CSS)
        }
    
        async function fetchTrainingData() {
            try {
                const res = await fetch(API_URL);
                trainingData = await res.json();
                updateAvailableCategories();
                updateDynamicCategories();
                displayTrainingData();
            } catch (err) {
                trainingDataList.innerHTML = '<p class="text-red-400 text-sm">Gagal memuat data dari server.</p>';
            }
        }
    
        let currentFilter = 'all';
        
        function displayTrainingData() {
            if (trainingData.length === 0) {
                trainingDataList.innerHTML = '<p class="text-gray-400 text-sm">Belum ada data training</p>';
                updateStats();
                return;
            }
            // Filter data berdasarkan kategori
            const filteredData = currentFilter === 'all' 
                ? trainingData 
                : trainingData.filter(data => data.category === currentFilter);
            if (filteredData.length === 0) {
                trainingDataList.innerHTML = '<p class="text-gray-400 text-sm">Tidak ada data untuk kategori ini</p>';
                return;
            }
            trainingDataList.innerHTML = filteredData.map((data, index) => `
                <div class="data-card-simple">
                    <div class="data-header">
                        <span class="category-badge ${getCategoryClass(data.category || 'Umum')}">${data.category || 'Umum'}</span>
                        <div class="card-actions-simple">
                            <button data-edit-id="${data.id}" data-edit-question="${data.question.replace(/\"/g, '&quot;')}" data-edit-answer="${data.answer.replace(/\"/g, '&quot;')}" data-edit-category="${data.category || 'Umum'}" class="action-btn edit-btn" title="Edit">✏️</button>
                            <button data-remove-id="${data.id}" class="action-btn delete-btn" title="Hapus">×</button>
                        </div>
                    </div>
                    <div class="question-simple">${data.question}</div>
                    <div class="answer-simple">${data.answer}</div>
                </div>
            `).join('');
            // Event listeners setelah render
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-edit-id');
                    const question = this.getAttribute('data-edit-question').replace(/&quot;/g, '"');
                    const answer = this.getAttribute('data-edit-answer').replace(/&quot;/g, '"');
                    const category = this.getAttribute('data-edit-category');
                    editTrainingData(id, question, answer, category);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-remove-id');
                    removeTrainingData(id);
                });
            });
            updateStats();
        }
        
        function updateAvailableCategories() {
            // Extract unique categories from training data
            const categoriesFromData = [...new Set(trainingData.map(d => d.category).filter(cat => cat))];
            availableCategories = [...new Set([...availableCategories, ...categoriesFromData])];
            
            // Update category input options
            categoryInput.innerHTML = availableCategories.map(cat => 
                `<option value="${cat}">${cat}</option>`
            ).join('') + '<option value="__NEW__">+ Tambah Kategori Baru</option>';
        }
        
        function updateDynamicCategories() {
            // Gabungkan semua tombol ke dalam satu baris
            const bar = document.getElementById('category-filter-bar');
            bar.innerHTML = '';
            // Tombol "Semua"
            const allBtn = document.createElement('button');
            allBtn.className = 'filter-btn';
            allBtn.setAttribute('data-category', 'all');
            allBtn.textContent = 'Semua';
            if(currentFilter === 'all') allBtn.classList.add('active');
            allBtn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = 'all';
                displayTrainingData();
            });
            bar.appendChild(allBtn);
            // Tombol kategori dinamis
            availableCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-category', category);
                btn.textContent = category;
                if(currentFilter === category) btn.classList.add('active');
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = category;
                    displayTrainingData();
                });
                bar.appendChild(btn);
            });
            // Tombol tambah kategori
            const addBtn = document.createElement('button');
            addBtn.id = 'add-category-btn';
            addBtn.className = 'filter-btn add-category-btn';
            addBtn.innerHTML = '<span>+</span> Tambah Kategori';
            addBtn.style.display = 'inline-block';
            addBtn.addEventListener('click', showCategoryModal);
            bar.appendChild(addBtn);
        }
        
        function updateStats() {
            const total = trainingData.length;
            document.getElementById('total-data').textContent = total;
            
            // Update category stats dynamically
            const categoryStats = document.getElementById('category-stats');
            categoryStats.innerHTML = '';
            
            availableCategories.forEach(category => {
                const count = trainingData.filter(d => d.category === category).length;
                if (count > 0) { // Only show categories with data
                    const statItem = document.createElement('div');
                    statItem.className = 'stat-item';
                    statItem.innerHTML = `
                        <div class="stat-number">${count}</div>
                        <div class="stat-label">${category}</div>
                    `;
                    categoryStats.appendChild(statItem);
                }
            });
        }
    
        function editTrainingData(id, question, answer, category) {
            editingId = id;
            questionInput.value = question;
            answerInput.value = answer;
            categoryInput.value = category || 'Umum';
            addDataBtn.textContent = 'Update Data';
            addDataBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
            addDataBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            cancelEditBtn.classList.remove('hidden');
            
            // Scroll ke input
            questionInput.scrollIntoView({ behavior: 'smooth' });
        }
        
        function cancelEdit() {
            editingId = null;
            questionInput.value = '';
            answerInput.value = '';
            categoryInput.value = 'Umum';
            hideQuickAddCategory(); // Hide quick add form
            addDataBtn.textContent = 'Tambah Data';
            addDataBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            addDataBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            cancelEditBtn.classList.add('hidden');
        }
    
        async function addTrainingData() {
            const question = questionInput.value.trim();
            const answer = answerInput.value.trim();
            const category = categoryInput.value;
            if (!question || !answer) return;
    
            try {
                let url = API_URL;
                let method = 'POST';
                let body = JSON.stringify({ question, answer, category, admin: adminName });
                
                if (editingId) {
                    // Update existing data
                    body = JSON.stringify({ id: editingId, question, answer, category, admin: adminName });
                }
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: body
                });
                const result = await res.json();
                if (result.success) {
                    questionInput.value = '';
                    answerInput.value = '';
                    editingId = null;
                    addDataBtn.textContent = 'Tambah Data';
                    addDataBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                    addDataBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                    cancelEditBtn.classList.add('hidden');
                    fetchTrainingData();
                } else {
                    alert("Gagal menambahkan data.");
                }
            } catch (err) {
                alert("Gagal menambahkan data.");
            }
        }
    
        async function removeTrainingData(id) {
            if (!confirm("Yakin ingin menghapus data ini?")) return;
    
            try {
                const res = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const result = await res.json();
                if (result.success) {
                    fetchTrainingData();
                } else {
                    alert("Gagal menghapus data.");
                }
            } catch (err) {
                alert("Gagal menghapus data.");
            }
        }
    

    
        async function clearAllTrainingData() {
            trainingData = []; // hanya bersihkan tampilan, tidak hapus di server
            displayTrainingData();
    
            // Kalau ingin hapus semua di server, kamu bisa buat API `delete_all` di training.php
        }
    
        addDataBtn.addEventListener('click', addTrainingData);
        cancelEditBtn.addEventListener('click', cancelEdit);
        clearDataBtn.addEventListener('click', clearAllTrainingData);
        
        // Category modal functions
        function showCategoryModal() {
            categoryModal.classList.remove('hidden');
            newCategoryInput.focus();
        }
        
        function hideCategoryModal() {
            categoryModal.classList.add('hidden');
            newCategoryInput.value = '';
            categoryColorInput.value = 'umum';
        }
        
        function addNewCategory() {
            const newCategory = newCategoryInput.value.trim();
            const color = categoryColorInput.value;
            
            if (!newCategory) {
                alert('Mohon masukkan nama kategori');
                return;
            }
            
            if (availableCategories.includes(newCategory)) {
                alert('Kategori ini sudah ada');
                return;
            }
            
            // Add new category to available categories
            availableCategories.push(newCategory);
            
            // Update UI
            updateDynamicCategories();
            updateAvailableCategories();
            
            // Auto-select the new category in the dropdown
            categoryInput.value = newCategory;
            
            // Hide modal
            hideCategoryModal();
            
            // Show success message
            alert(`Kategori "${newCategory}" berhasil ditambahkan dan dipilih`);
        }
        
        // Quick add category functions
        function showQuickAddCategory() {
            quickAddCategory.classList.remove('hidden');
            quickCategoryInput.focus();
        }
        
        function hideQuickAddCategory() {
            quickAddCategory.classList.add('hidden');
            quickCategoryInput.value = '';
        }
        
        function addQuickCategory() {
            const newCategory = quickCategoryInput.value.trim();
            
            if (!newCategory) {
                alert('Mohon masukkan nama kategori');
                return;
            }
            
            if (availableCategories.includes(newCategory)) {
                alert('Kategori ini sudah ada');
                return;
            }
            
            // Add new category to available categories
            availableCategories.push(newCategory);
            
            // Update UI
            updateDynamicCategories();
            updateAvailableCategories();
            
            // Auto-select the new category in the dropdown
            categoryInput.value = newCategory;
            
            // Hide quick add form
            hideQuickAddCategory();
            
            // Show success message
            alert(`Kategori "${newCategory}" berhasil ditambahkan dan dipilih`);
        }
        
        // Event listeners for category modal
        addCategoryFromFormBtn.addEventListener('click', showQuickAddCategory);
        saveCategoryBtn.addEventListener('click', addNewCategory);
        cancelCategoryBtn.addEventListener('click', hideCategoryModal);
        
        // Event listeners for quick add category
        saveQuickCategoryBtn.addEventListener('click', addQuickCategory);
        cancelQuickCategoryBtn.addEventListener('click', hideQuickAddCategory);
        
        // Enter key for quick add category
        quickCategoryInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addQuickCategory();
            }
        });
        
        // Expand/collapse functionality
        let isExpanded = true;
        // Sembunyikan stats-bar di awal
        statsBar.classList.add('hidden');
        expandBtn.classList.add('expanded');
        expandIcon.textContent = '📊';
        expandBtn.title = 'Tampilkan Stats';

        function toggleExpand() {
            isExpanded = !isExpanded;
            if (isExpanded) {
                // Sembunyikan stats bar
                statsBar.classList.add('hidden');
                expandBtn.classList.add('expanded');
                expandIcon.textContent = '📊';
                expandBtn.title = 'Tampilkan Stats';
            } else {
                // Tampilkan stats bar
                statsBar.classList.remove('hidden');
                expandBtn.classList.remove('expanded');
                expandIcon.textContent = '⤢';
                expandBtn.title = 'Sembunyikan Stats';
            }
        }
        
        // Event listener for expand button
        expandBtn.addEventListener('click', toggleExpand);
        
        // Close modal when clicking outside
        categoryModal.addEventListener('click', function(e) {
            if (e.target === categoryModal) {
                hideCategoryModal();
            }
        });
        
        // Enter key to save category
        newCategoryInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addNewCategory();
            }
        });
        
        // Handle "Add New Category" selection in dropdown
        categoryInput.addEventListener('change', function() {
            if (this.value === '__NEW__') {
                showCategoryModal();
                // Reset to first option after showing modal
                setTimeout(() => {
                    this.value = availableCategories[0] || 'Umum';
                }, 100);
            }
        });
    
        dataFile.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    parseAndSendBulkData(content);
                };
                reader.readAsText(file);
            }
        });
    
        async function parseAndSendBulkData(content) {
            let parsed = [];
    
            try {
                const jsonData = JSON.parse(content);
                if (Array.isArray(jsonData)) {
                    parsed = jsonData.filter(item => item.question && item.answer);
                }
            } catch (e) {
                const lines = content.split('\n').filter(line => line.trim());
                for (let i = 0; i < lines.length - 1; i += 2) {
                    const question = lines[i].replace(/^Q:\s*/, '').trim();
                    const answer = lines[i + 1].replace(/^A:\s*/, '').trim();
                    if (question && answer) {
                        parsed.push({ question, answer });
                    }
                }
            }
    
            for (const item of parsed) {
                // Add default category if not present
                if (!item.category) {
                    item.category = 'Umum';
                }
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item)
                });
            }
    
            fetchTrainingData();
        }
    
        window.onload = () => {
            fetchTrainingData();
        };

        // Ambil nama admin dari localStorage
        const adminName = localStorage.getItem('adminUserId') || '';
        // Tampilkan nama admin login di header dan handle dropdown
        const adminBtn = document.getElementById('admin-name-header');
        const dropdown = document.getElementById('admin-dropdown');
        adminBtn.textContent = adminName;
        adminBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
        });
        document.addEventListener('click', function(e) {
            if (!dropdown.classList.contains('hidden')) {
                dropdown.classList.add('hidden');
            }
        });
        dropdown.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    </script>
    
</body>
