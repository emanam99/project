<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Gemini API</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../icon.png">
  <link rel="icon" type="image/x-icon" href="../icon.png">
  <link rel="shortcut icon" type="image/x-icon" href="../icon.png">
  <link rel="apple-touch-icon" href="../icon.png">
  <meta name="msapplication-TileImage" content="../icon.png">
  <meta name="msapplication-TileColor" content="#4299e1">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Gemini API</h1>
    
    <div>
      <label>API Key:</label>
      <input type="text" id="apiKey" placeholder="Masukkan API Key Gemini Anda" value="AIzaSyCt-NnICWDG_wW6zft1Ety3yNXt-grtrQY">
    </div>
    
    <div>
      <label>Pertanyaan Test:</label>
      <input type="text" id="testQuestion" placeholder="Masukkan pertanyaan test" value="Apa itu JavaScript?">
    </div>
    
    <button onclick="testAPI()">Test API</button>
    
    <div id="result"></div>
  </div>

  <script>
    async function testAPI() {
      const apiKey = document.getElementById('apiKey').value;
      const question = document.getElementById('testQuestion').value;
      const resultDiv = document.getElementById('result');
      
      if (!apiKey) {
        resultDiv.innerHTML = '<div class="error">API Key tidak boleh kosong!</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="info">Mengirim request...</div>';
      
      try {
        const payload = {
          contents: [
            {
              role: 'user',
              parts: [{ text: question }]
            }
          ],
          generationConfig: {
            temperature: 0.7,
            topK: 40,
            topP: 0.95,
            maxOutputTokens: 1024
          }
        };
        
        console.log('Testing API with payload:', payload);
        
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
          const errorText = await response.text();
          console.error('API Error:', errorText);
          resultDiv.innerHTML = `<div class="error">
            <strong>Error ${response.status}:</strong><br>
            ${errorText}
          </div>`;
          return;
        }
        
        const result = await response.json();
        console.log('API Response:', result);
        
        const aiText = result?.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (aiText) {
          resultDiv.innerHTML = `<div class="success">
            <strong>✅ API Berhasil!</strong><br>
            <strong>Jawaban:</strong><br>
            ${aiText}
          </div>`;
        } else {
          resultDiv.innerHTML = `<div class="error">
            <strong>❌ Tidak ada jawaban dari AI</strong><br>
            Response: ${JSON.stringify(result)}
          </div>`;
        }
        
      } catch (error) {
        console.error('Test error:', error);
        resultDiv.innerHTML = `<div class="error">
          <strong>❌ Error:</strong><br>
          ${error.message}
        </div>`;
      }
    }
  </script>
</body>
</html>
